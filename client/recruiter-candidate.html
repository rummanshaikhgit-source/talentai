<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentAI · Candidate Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; }
        .profile-section { transition: all 0.3s ease; border: 1px solid #E5E7EB; }
        .profile-section:hover { border-color: #3B82F6; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .skill-tag { background: #EFF6FF; color: #3B82F6; transition: all 0.2s ease; }
        .skill-tag:hover { background: #DBEAFE; transform: scale(1.02); }
        .match-high { background: #DCFCE7; color: #166534; }
        .match-medium { background: #FEF9C3; color: #854D0E; }
        .match-low { background: #FEE2E2; color: #991B1B; }
        .btn-primary { background: #F97316; color: white; transition: all 0.3s ease; }
        .btn-primary:hover { background: #EA580C; transform: translateY(-2px); }
        .btn-secondary { background: #3B82F6; color: white; transition: all 0.3s ease; }
        .btn-secondary:hover { background: #2563EB; transform: translateY(-2px); }
        .loading { display: inline-block; width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid #F97316; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50"><div class="container mx-auto px-6 py-4"><div class="flex items-center justify-between"><div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'"><div class="w-10 h-10 bg-gradient-to-br from-[#3B82F6] to-[#8B5CF6] rounded-xl flex items-center justify-center"><i data-lucide="sparkles" class="text-white" size="22"></i></div><div><span class="text-2xl font-bold text-gray-800">TalentAI</span><span class="ml-2 text-sm bg-[#F97316]/10 text-[#F97316] px-2 py-0.5 rounded-full">Recruiter</span></div></div><button onclick="window.location.href='recruiter-dashboard.html'" class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 transition-all flex items-center gap-2"><i data-lucide="arrow-left" size="16"></i>Back to Dashboard</button></div></div></nav>
    
    <div class="container mx-auto px-6 py-8 max-w-4xl">
        <div id="loadingState" class="text-center py-12">
            <div class="loading mx-auto mb-4"></div>
            <p class="text-gray-500">Loading candidate profile...</p>
        </div>
        
        <div id="errorState" class="hidden text-center py-12">
            <i data-lucide="alert-circle" class="text-red-500 mx-auto mb-4" size="48"></i>
            <p class="text-gray-600 mb-4">Failed to load candidate profile</p>
            <button onclick="window.location.href='recruiter-dashboard.html'" class="btn-primary px-6 py-2 rounded-lg">Back to Dashboard</button>
        </div>
        
        <div id="profileContent" class="hidden space-y-6"></div>
    </div>
    
    <script type="module">
        import API from './js/api.js';
        import Utils from './js/utils.js';
        
        lucide.createIcons();
        
        // Get candidate ID from URL or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        let candidateId = urlParams.get('id');
        
        // If not in URL, try to get from localStorage (for backward compatibility)
        if (!candidateId) {
            const savedCandidate = localStorage.getItem('viewingCandidate');
            if (savedCandidate) {
                try {
                    const temp = JSON.parse(savedCandidate);
                    candidateId = temp.id;
                } catch(e) {}
            }
        }
        
        if (!candidateId) {
            // No candidate ID, show error
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            lucide.createIcons();
        } else {
            loadCandidateProfile(candidateId);
        }
        
        async function loadCandidateProfile(id) {
            try {
                console.log('🔍 Fetching candidate profile for ID:', id);
                
                // In a real implementation, you would have an endpoint like:
                // const data = await API.getCandidateProfile(id);
                // For now, we'll use the existing getPublicProfile which gets public profiles
                // Note: This assumes the candidate profile is public or the recruiter has access
                
                // Since we don't have a dedicated recruiter endpoint yet,
                // we'll use the public profile endpoint
                const data = await API.getPublicProfile(id);
                const profile = data.profile;
                const user = profile.user;
                
                // Calculate match score based on completion
                const completion = profile.completionScore || 0;
                const matchScore = Math.floor(completion * 0.9) + 10;
                
                // Get match class
                function getMatchClass(match) {
                    if (match >= 85) return 'match-high';
                    if (match >= 70) return 'match-medium';
                    return 'match-low';
                }
                
                // Get skills as array of strings
                const skills = (profile.skills || []).map(s => typeof s === 'object' ? s.name : s);
                
                // Format experience
                const experience = profile.experience || [];
                
                // Format projects
                const projects = profile.projects || [];
                
                // Render profile
                const container = document.getElementById('profileContent');
                container.innerHTML = `
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            <div class="flex items-center gap-4">
                                <div class="w-20 h-20 bg-gradient-to-br from-[#3B82F6] to-[#8B5CF6] rounded-2xl flex items-center justify-center text-white font-bold text-3xl">${user.name.charAt(0).toUpperCase()}</div>
                                <div>
                                    <h1 class="text-2xl md:text-3xl font-bold text-gray-800">${user.name}</h1>
                                    <p class="text-lg text-gray-600 mt-1">${profile.personalInfo?.headline || 'Professional'}</p>
                                    <div class="flex flex-wrap items-center gap-3 mt-2 text-sm text-gray-500">
                                        <span class="flex items-center gap-1"><i data-lucide="map-pin" size="14"></i> ${profile.personalInfo?.location || 'Location not specified'}</span>
                                        <span class="flex items-center gap-1"><i data-lucide="briefcase" size="14"></i> ${profile.personalInfo?.experienceLevel || 'Experience not specified'}</span>
                                        <span class="flex items-center gap-1"><i data-lucide="mail" size="14"></i> ${user.email}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="text-center">
                                <div class="px-4 py-2 rounded-full text-lg font-bold ${getMatchClass(matchScore)}">${matchScore}% Match Score</div>
                                <p class="text-xs text-gray-500 mt-2">AI-powered assessment</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 bg-[#3B82F6]/10 rounded-lg flex items-center justify-center"><i data-lucide="sparkles" class="text-[#3B82F6]" size="18"></i></div>
                            <h3 class="font-bold text-gray-800">Professional Summary</h3>
                        </div>
                        <p class="text-gray-700 leading-relaxed">${profile.aiGenerated?.summary || 'No summary available.'}</p>
                    </div>
                    
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 bg-[#3B82F6]/10 rounded-lg flex items-center justify-center"><i data-lucide="code-2" class="text-[#3B82F6]" size="18"></i></div>
                            <h3 class="font-bold text-gray-800">Technical Skills</h3>
                        </div>
                        <div class="flex flex-wrap gap-2">${skills.map(s => `<span class="skill-tag px-3 py-1.5 rounded-lg text-sm font-medium">${s}</span>`).join('') || '<p class="text-gray-500">No skills added yet.</p>'}</div>
                    </div>
                    
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 bg-[#3B82F6]/10 rounded-lg flex items-center justify-center"><i data-lucide="briefcase" class="text-[#3B82F6]" size="18"></i></div>
                            <h3 class="font-bold text-gray-800">Work Experience</h3>
                        </div>
                        <div class="space-y-4">${experience.map(exp => `
                            <div class="border-l-4 border-[#3B82F6] pl-4">
                                <p class="font-semibold text-gray-800">${exp.role} at ${exp.company}</p>
                                <p class="text-xs text-gray-500 mt-1">${exp.startDate || ''} - ${exp.current ? 'Present' : (exp.endDate || '')}</p>
                                <p class="text-sm text-gray-600 mt-2">${exp.description || 'No description provided.'}</p>
                            </div>
                        `).join('') || '<p class="text-gray-500">No experience added yet.</p>'}</div>
                    </div>
                    
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 bg-[#3B82F6]/10 rounded-lg flex items-center justify-center"><i data-lucide="folder-git-2" class="text-[#3B82F6]" size="18"></i></div>
                            <h3 class="font-bold text-gray-800">Featured Projects</h3>
                        </div>
                        <div class="grid md:grid-cols-2 gap-4">${projects.map(proj => `
                            <div class="bg-gray-50 rounded-lg p-4">
                                <p class="font-semibold text-gray-800">${proj.title}</p>
                                <p class="text-xs text-gray-500 mt-1">Tech: ${proj.techStack || 'Not specified'}</p>
                                <p class="text-sm text-gray-600 mt-2">${proj.description || 'No description provided.'}</p>
                            </div>
                        `).join('') || '<p class="text-gray-500 col-span-2 text-center">No projects added yet.</p>'}</div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <button onclick="downloadResume('${user.profileId}')" class="px-6 py-3 border-2 border-[#F97316] text-[#F97316] rounded-xl font-semibold hover:bg-[#F97316] hover:text-white transition-all flex items-center justify-center gap-2"><i data-lucide="download" size="18"></i>Download Resume</button>
                        <button onclick="shareCandidate('${user.profileId}')" class="px-6 py-3 border-2 border-[#3B82F6] text-[#3B82F6] rounded-xl font-semibold hover:bg-[#3B82F6] hover:text-white transition-all flex items-center justify-center gap-2"><i data-lucide="share-2" size="18"></i>Share Profile</button>
                        <button onclick="scheduleInterview()" class="px-6 py-3 btn-primary rounded-xl font-semibold flex items-center justify-center gap-2"><i data-lucide="calendar" size="18"></i>Schedule Interview</button>
                    </div>
                `;
                
                lucide.createIcons();
                
                // Hide loading, show content
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('profileContent').classList.remove('hidden');
                
            } catch (error) {
                console.error('Failed to load candidate profile:', error);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('errorState').classList.remove('hidden');
                lucide.createIcons();
            }
        }
        
        window.downloadResume = async function(profileId) {
            Utils.showToast('📄 Generating resume...', 'info');
            try {
                await API.downloadResume();
                // Track download
                await API.trackResumeDownload(profileId);
                Utils.showToast('✨ Resume downloaded successfully!', 'success');
            } catch (error) {
                Utils.showToast('Failed to download resume', 'error');
            }
        };
        
        window.shareCandidate = function(profileId) {
            const link = `https://fabulous-salmiakki-9a2bb1.netlify.app/public-profile.html?id=${profileId}`;
            navigator.clipboard.writeText(link);
            Utils.showToast('🔗 Profile link copied to clipboard!', 'success');
        };
        
        window.scheduleInterview = function() {
            Utils.showToast('📅 Interview scheduling feature coming soon!', 'info');
        };
    </script>
</body>
</html>
