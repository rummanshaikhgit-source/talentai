<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentAI · Candidate Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; }
        .profile-section { transition: all 0.3s ease; border: 1px solid #E5E7EB; }
        .profile-section:hover { border-color: #3B82F6; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .skill-tag { background: #EFF6FF; color: #3B82F6; transition: all 0.2s ease; }
        .skill-tag:hover { background: #DBEAFE; transform: scale(1.02); }
        .match-high { background: #DCFCE7; color: #166534; }
        .btn-primary { background: #F97316; color: white; transition: all 0.3s ease; }
        .btn-primary:hover { background: #EA580C; transform: translateY(-2px); }
        .btn-secondary { background: #3B82F6; color: white; transition: all 0.3s ease; }
        .btn-secondary:hover { background: #2563EB; transform: translateY(-2px); }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50"><div class="container mx-auto px-6 py-4"><div class="flex items-center justify-between"><div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'"><div class="w-10 h-10 bg-gradient-to-br from-[#3B82F6] to-[#8B5CF6] rounded-xl flex items-center justify-center"><i data-lucide="sparkles" class="text-white" size="22"></i></div><div><span class="text-2xl font-bold text-gray-800">TalentAI</span><span class="ml-2 text-sm bg-[#F97316]/10 text-[#F97316] px-2 py-0.5 rounded-full">Recruiter</span></div></div><button onclick="window.location.href='recruiter-dashboard.html'" class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 transition-all flex items-center gap-2"><i data-lucide="arrow-left" size="16"></i>Back to Dashboard</button></div></div></nav>
    
    <div class="container mx-auto px-6 py-8 max-w-4xl"><div id="candidateProfile" class="space-y-6"><div class="text-center py-12"><div class="w-12 h-12 border-4 border-[#3B82F6] border-t-[#F97316] rounded-full animate-spin mx-auto mb-4"></div><p class="text-gray-500">Loading candidate profile...</p></div></div></div>
    
    <script>
        lucide.createIcons(); let candidate=null; const savedCandidate=localStorage.getItem('viewingCandidate'); if(savedCandidate)candidate=JSON.parse(savedCandidate); else candidate={id:1,name:"Priya Sharma",role:"Frontend Developer",experience:"1-3 years",location:"Mumbai, India",skills:["React","JavaScript","TypeScript","Tailwind CSS"],match:92,email:"priya@example.com",summary:"Frontend developer with 2 years of experience building responsive React applications. Passionate about creating beautiful, performant user interfaces.",avatar:"P",appliedDate:"2024-03-15",experience:[{company:"TechCorp India",role:"Frontend Developer",startDate:"Jun 2023",endDate:"Present",description:"Built and maintained responsive web applications using React, improving page load time by 30%."},{company:"StartupHub",role:"Junior Developer",startDate:"Jan 2022",endDate:"May 2023",description:"Assisted in developing client websites and applications. Fixed bugs and implemented new features."}],projects:[{title:"Food Delivery Platform",techStack:"React, Node.js, MongoDB",description:"Developed a full-stack food delivery application featuring real-time order tracking, secure payment integration."},{title:"Portfolio Website",techStack:"React, Tailwind CSS",description:"Built a personal portfolio website with smooth animations and responsive design."}]};
        function getMatchClass(match){if(match>=85)return 'match-high';if(match>=70)return 'match-medium';return 'match-low';}
        function renderProfile(){const container=document.getElementById('candidateProfile');container.innerHTML=`<div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200"><div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6"><div class="flex items-center gap-4"><div class="w-20 h-20 bg-gradient-to-br from-[#3B82F6] to-[#8B5CF6] rounded-2xl flex items-center justify-center text-white font-bold text-3xl">${candidate.avatar}</div><div><h1 class="text-2xl md:text-3xl font-bold text-gray-800">${candidate.name}</h1><p class="text-lg text-gray-600 mt-1">${candidate.role}</p><div class="flex flex-wrap items-center gap-3 mt-2 text-sm text-gray-500"><span class="flex items-center gap-1"><i data-lucide="map-pin" size="14"></i> ${candidate.location}</span><span class="flex items-center gap-1"><i data-lucide="briefcase" size="14"></i> ${candidate.experience} experience</span><span class="flex items-center gap-1"><i data-lucide="mail" size="14"></i> ${candidate.email}</span></div></div></div><div class="text-center"><div class="px-4 py-2 rounded-full text-lg font-bold ${getMatchClass(candidate.match)}">${candidate.match}% Match Score</div><p class="text-xs text-gray-500 mt-2">AI-powered assessment</p></div></div></div><div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 bg-[#3B82F6]/10 rounded-lg flex items-center justify-center"><i data-lucide="sparkles" class="text-[#3B82F6]" size="18"></i></div><h3 class="font-bold text-gray-800">Professional Summary</h3></div><p class="text-gray-700 leading-relaxed">${candidate.summary}</p></div><div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 bg-[#3B82F6]/10 rounded-lg flex items-center justify-center"><i data-lucide="code-2" class="text-[#3B82F6]" size="18"></i></div><h3 class="font-bold text-gray-800">Technical Skills</h3></div><div class="flex flex-wrap gap-2">${candidate.skills.map(s=>`<span class="skill-tag px-3 py-1.5 rounded-lg text-sm font-medium">${s}</span>`).join('')}</div></div><div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 bg-[#3B82F6]/10 rounded-lg flex items-center justify-center"><i data-lucide="briefcase" class="text-[#3B82F6]" size="18"></i></div><h3 class="font-bold text-gray-800">Work Experience</h3></div><div class="space-y-4">${candidate.experience.map(exp=>`<div class="border-l-4 border-[#3B82F6] pl-4"><p class="font-semibold text-gray-800">${exp.role} at ${exp.company}</p><p class="text-xs text-gray-500 mt-1">${exp.startDate} - ${exp.endDate}</p><p class="text-sm text-gray-600 mt-2">${exp.description}</p></div>`).join('')}</div></div><div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 bg-[#3B82F6]/10 rounded-lg flex items-center justify-center"><i data-lucide="folder-git-2" class="text-[#3B82F6]" size="18"></i></div><h3 class="font-bold text-gray-800">Featured Projects</h3></div><div class="grid md:grid-cols-2 gap-4">${candidate.projects.map(proj=>`<div class="bg-gray-50 rounded-lg p-4"><p class="font-semibold text-gray-800">${proj.title}</p><p class="text-xs text-gray-500 mt-1">Tech: ${proj.techStack}</p><p class="text-sm text-gray-600 mt-2">${proj.description}</p></div>`).join('')}</div></div><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><button onclick="downloadResume()" class="px-6 py-3 border-2 border-[#F97316] text-[#F97316] rounded-xl font-semibold hover:bg-[#F97316] hover:text-white transition-all flex items-center justify-center gap-2"><i data-lucide="download" size="18"></i>Download Resume</button><button onclick="shareCandidate()" class="px-6 py-3 border-2 border-[#3B82F6] text-[#3B82F6] rounded-xl font-semibold hover:bg-[#3B82F6] hover:text-white transition-all flex items-center justify-center gap-2"><i data-lucide="share-2" size="18"></i>Share Profile</button><button onclick="scheduleInterview()" class="px-6 py-3 btn-primary rounded-xl font-semibold flex items-center justify-center gap-2"><i data-lucide="calendar" size="18"></i>Schedule Interview</button></div>`;lucide.createIcons();}
        function downloadResume(){showToast('📄 Resume downloaded!','success');}
        function shareCandidate(){navigator.clipboard.writeText(`https://talentai.app/candidate/${candidate.id}`);showToast('🔗 Profile link copied!','success');}
        function scheduleInterview(){showToast('📅 Interview scheduling feature coming soon!','info');}
        function showToast(message,type){const toast=document.createElement('div');toast.className=`fixed bottom-4 right-4 z-50 px-6 py-3 rounded-xl text-white font-medium shadow-lg transition-all ${type==='success'?'bg-[#F97316]':'bg-[#3B82F6]'}`;toast.innerHTML=`<div class="flex items-center gap-2"><i data-lucide="${type==='success'?'check-circle':'info'}" size="18"></i><span>${message}</span></div>`;document.body.appendChild(toast);lucide.createIcons();setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),300);},3000);}
        renderProfile();
    </script>
</body>
</html>
